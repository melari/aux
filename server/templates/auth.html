<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aux — authenticate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0c0c0c;
      --bg-alt: #111;
      --border: #222;
      --text:   #808080;
      --bright: #c8c8c8;
      --dim:    #404040;
      --green:  #4a9;
      --red:    #a44;
    }
    html, body {
      height: 100%;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 5px 12px;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      color: var(--dim);
      height: 32px;
      display: flex;
      align-items: center;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 320px;
      border: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card h1 { font-size: 13px; color: var(--bright); font-weight: normal; }
    .card p  { font-size: 12px; line-height: 1.6; }
    button {
      font-family: inherit;
      font-size: 13px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
    button:hover  { background: #181818; color: var(--bright); border-color: var(--dim); }
    button.primary { color: var(--green); border-color: color-mix(in srgb, var(--green) 40%, transparent); }
    button.primary:hover { background: color-mix(in srgb, var(--green) 8%, transparent); border-color: var(--green); }
    button:disabled { opacity: 0.4; cursor: default; }
    #error { color: var(--red); font-size: 12px; display: none; }
    a { color: var(--dim); text-decoration: none; font-size: 12px; }
    a:hover { color: var(--text); }
  </style>
</head>
<body>
  <header>aux/auth</header>
  <main>
    <div class="card">
      <h1>authenticate</h1>
      <p>Use your registered passkey to sign in.</p>
      <div id="error"></div>
      <button class="primary" id="auth-btn" onclick="authenticate()">[ authenticate with face id ]</button>
      <a href="/setup">set up a passkey →</a>
    </div>
  </main>
  <script>
    function b64url2buf(b) {
      const s = atob(b.replace(/-/g, '+').replace(/_/g, '/'));
      return Uint8Array.from(s, c => c.charCodeAt(0)).buffer;
    }
    function buf2b64url(buf) {
      const bytes = new Uint8Array(buf);
      let s = '';
      bytes.forEach(b => s += String.fromCharCode(b));
      return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
    function setError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    async function authenticate() {
      const btn = document.getElementById('auth-btn');
      btn.disabled = true;
      btn.textContent = '[ authenticating... ]';
      setError('');
      try {
        const r1 = await fetch('/auth/challenge', { method: 'POST' });
        const opts = await r1.json();
        console.log('challenge response:', opts);
        if (!r1.ok) { setError(opts.error); return; }

        opts.challenge = b64url2buf(opts.challenge);
        if (opts.allowCredentials) {
          opts.allowCredentials = opts.allowCredentials.map(c => ({ ...c, id: b64url2buf(c.id) }));
        }

        const assertion = await navigator.credentials.get({ publicKey: opts });

        const r2 = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id:    assertion.id,
            rawId: buf2b64url(assertion.rawId),
            type:  assertion.type,
            response: {
              clientDataJSON:    buf2b64url(assertion.response.clientDataJSON),
              authenticatorData: buf2b64url(assertion.response.authenticatorData),
              signature:         buf2b64url(assertion.response.signature),
              userHandle: assertion.response.userHandle ? buf2b64url(assertion.response.userHandle) : null
            }
          })
        });
        const d2 = await r2.json();
        if (r2.ok) { window.location = '/'; return; }
        setError(d2.error);
      } catch (e) {
        setError(e.name === 'NotAllowedError' ? 'authentication cancelled or timed out' : e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '[ authenticate with passkey ]';
      }
    }
  </script>
</body>
</html>
